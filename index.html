<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Registration - PuduPush</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-messaging-compat.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center p-4 font-sans">

  <div class="bg-gray-900 border border-gray-800 p-8 rounded-2xl shadow-2xl max-w-sm w-full space-y-4 text-center">
    <h2 class="text-xl font-black text-white tracking-wide uppercase">Device Registration</h2>
    <p class="text-xs text-gray-400">Connecting notification link node for <br/><span id="client-domain" class="text-yellow-500 font-bold">Loading...</span></p>
    
    <button id="pudu-direct-grant-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-6 rounded-xl w-full shadow-lg transition cursor-pointer text-sm uppercase tracking-wide focus:outline-none">
       Click to Enable Alerts
    </button>
    
    <p class="text-xs font-mono text-yellow-500 pt-2" id="bridge-status">Please click the button above to confirm subscription.</p>
  </div>

  <script>
    const firebaseConfig = {
        apiKey: "AIzaSyBCBuEq-OWw7aZnc1kMrjvd1oatFqUYGUU",
        authDomain: "push-2d47c.firebaseapp.com",
        projectId: "push-2d47c",
        storageBucket: "push-2d47c.firebasestorage.app",
        messagingSenderId: "911235507971",
        appId: "1:911235507971:web:ff7d4af6210bc59bdf2b36"
    };
    firebase.initializeApp(firebaseConfig);

    let activeAppId = "";
    let domainOrigin = "";

    if (window.name && window.name.indexOf('pudupush_bridge_') === 0) {
       const parts = window.name.replace('pudupush_bridge_', '').split('___');
       activeAppId = parts[0];
       domainOrigin = parts[1];
       document.getElementById('client-domain').innerText = domainOrigin;
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./firebase-messaging-sw.js')
      .then((reg) => console.log('Worker Registered'))
      .catch((err) => console.log('Worker Failed', err));
    }

    document.getElementById('pudu-direct-grant-btn').addEventListener('click', function() {
       const statusText = document.getElementById('bridge-status');
       statusText.innerText = "Requesting browser permission...";
       
       const messaging = firebase.messaging();
       messaging.requestPermission()
       .then(() => messaging.getToken({ vapidKey: 'BLfn5T8Dpj_IkWPlEL2w8SdZ49a5LUZFPOeLeMSgGUczW6blLXxdoW4_E6X6aeRMlCM-XnLSxsG52M_IFSw0qtk' }))
       .then((token) => {
          // ಮಾಸ್ಟರ್ ಮ್ಯಾಜಿಕ್: ಗಿಟ್‌ಹಬ್‌ನಿಂದ ಟೋಕನ್ ಸಿಕ್ಕ ತಕ್ಷಣ ಅದನ್ನು ಹಿನ್ನೆಲೆಯಲ್ಲಿ ಬ್ಲಾಗರ್ ಬ್ಯಾಕೆಂಡ್‌ಗೆ ಕಳುಹಿಸುವುದು
          const saveUrl = "https://push.onlinepudu.in/p/dashboard.html?mode=direct_save&token=" + token + "&appId=" + activeAppId + "&domain=" + domainOrigin;
          const imgTrigger = new Image();
          imgTrigger.src = saveUrl;
          
          document.getElementById('pudu-direct-grant-btn').style.display = 'none';
          statusText.innerHTML = "<span class='text-green-400 font-black text-sm uppercase block'>🎉 Connection Established!</span>";
          
          // 2 ಸೆಕೆಂಡ್‌ನಲ್ಲಿ ಪಾಪ್-ಅಪ್ ವಿಂಡೋ ತನ್ನಷ್ಟಕ್ಕೆ ತಾನೇ ಕ್ಲೋಸ್ ಆಗುತ್ತದೆ
          setTimeout(() => { window.close(); }, 2000);
       })
       .catch((err) => {
           statusText.innerHTML = "<span class='text-red-400 font-bold'>Connection Interrupted. Try Again.</span>";
       });
    });
  </script>
</body>
</html>
